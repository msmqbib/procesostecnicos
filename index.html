<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Calor</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Roboto, sans-serif; background: #f0f2f5; padding: 20px; margin: 0; }
        .container { max-width: 100%; background: white; border-radius: 12px; padding: 20px; }
        
        /* ========================================== */
        /* ESTADÍSTICAS Y BARRA DE PROGRESO           */
        /* ========================================== */
        .stats { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .stat-card { background: #f8f9fa; padding: 10px 20px; border-radius: 8px; text-align: center; min-width: 100px; }
        .stat-card .stat-number { font-size: 1.8em; font-weight: bold; }
        .stat-card .stat-label { font-size: 0.8em; color: #7f8c8d; margin-top: 5px; }
        
        .progress-container { margin: 15px 0; }
        .progress-bar { background: #ecf0f1; border-radius: 25px; height: 35px; overflow: hidden; }
        .progress-fill { background: #27ae60; height: 100%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; transition: width 0.3s; }
        .progress-text { text-align: center; margin-top: 5px; font-size: 12px; color: #7f8c8d; }
        
        /* ========================================== */
        /* RESTO DE ESTILOS                          */
        /* ========================================== */
        .grid { display: grid; grid-template-columns: repeat(50, 55px); gap: 3px; background: #f0f2f5; padding: 3px; overflow-x: auto; max-height: 55vh; overflow-y: auto; }
        .cell { width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; border-radius: 6px; font-weight: regular; color: white; position: relative; }
        .cell-error-Año { background-color: #119da4; }
        .cell-error-Idioma { background-color: #0c7489; }
        .cell-error-Mayúscula { background-color: #13505b; }
        .cell-corregido-alejandro { border: 3px solid #040404; }
        .cell-corregido-alejandro::after { content: "✓A"; position: absolute; bottom: 2px; right: 2px; font-size: 8px; background: rgba(4,4,4,0.9); padding: 2px 3px; border-radius: 3px; }
        .cell-corregido-martha { border: 3px solid #d7d9ce; }
        .cell-corregido-martha::after { content: "✓M"; position: absolute; bottom: 2px; right: 2px; font-size: 8px; background: rgba(215,217,206,0.9); padding: 2px 3px; border-radius: 3px; color: #2c3e50; }
        
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-alejandro { background: #34495e; color: white; }
        .btn-martha { background: #95a5a6; color: #2c3e50; }
        .active { transform: scale(1.05); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .sync-status { text-align: center; padding: 10px; margin: 10px; border-radius: 8px; }
        .synced { background: #d5f4e6; color: #27ae60; }
        .syncing { background: #ffeaa7; color: #f39c12; }
        
        .batch-control { text-align: center; margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 12px; }
        .batch-btn { background: #3498db; color: white; border: none; padding: 10px 20px; margin: 0 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .batch-info { font-size: 18px; font-weight: bold; margin: 0 15px; }
        
        @media (max-width: 900px) { .grid { grid-template-columns: repeat(30, 50px); } .cell { width: 50px; height: 50px; font-size: 8px; } }
    </style>
</head>
<body>
<div class="container">
    <h2>📊 Mapa de Calor</h2>
    
    <div id="syncStatus" class="sync-status syncing">🔄 Conectando...</div>
    
    <!-- ========================================== -->
    <!-- ESTADÍSTICAS (4 tarjetas)                  -->
    <!-- ========================================== -->
    <div class="stats">
        <div class="stat-card">

        <div class="stat-card">

    </div>
    
    <!-- ========================================== -->
    <!-- BARRA DE PROGRESO                          -->
    <!-- ========================================== -->
    <div class="progress-container">
        <div class="progress-bar">

        </div>
        <div class="progress-text" id="progressText">Progreso General</div>
    </div>
    
    <!-- ========================================== -->
    <!-- BOTONES DE PERSONA                         -->
    <!-- ========================================== -->
    <div style="text-align:center; margin: 15px 0;">
        <button id="alejandroBtn" class="btn-alejandro active">👤 Alejandro</button>
        <button id="marthaBtn" class="btn-martha">👤 Martha</button>
        <button id="syncBtn" style="background:#3498db; color:white;">🔄 Sincronizar</button>
    </div>
    
    <!-- ========================================== -->
    <!-- CONTROLES DE LOTES                         -->
    <!-- ========================================== -->
    <div class="batch-control">
        <button id="btnAnterior" class="batch-btn">◀ ANTERIOR</button>
        <span class="batch-info" id="loteInfo">Lote 1 / 1</span>
        <button id="btnSiguiente" class="batch-btn">SIGUIENTE ▶</button>
    </div>
    
    <!-- ========================================== -->
    <!-- MAPA DE CALOR                              -->
    <!-- ========================================== -->
    <div id="grid" class="grid"></div>

        💡 Haz clic en una casilla para marcar/desmarcar el error.
    </div>
</div>

    let correcciones = new Map();
    let personaActual = "alejandro";
    let loteActual = 1;
    let REGISTROS_POR_LOTE = 5000;
    
    const todosIds = Array.from(errores.keys()).sort((a,b) => a-b);
    const TOTAL = todosIds.length;
    const TOTAL_LOTES = Math.ceil(TOTAL / REGISTROS_POR_LOTE);
    
    function getIdsLote() {
        const inicio = (loteActual - 1) * REGISTROS_POR_LOTE;
        const fin = Math.min(inicio + REGISTROS_POR_LOTE, TOTAL);
        return todosIds.slice(inicio, fin);
    }
    
    async function cargar() {
        document.getElementById('syncStatus').innerHTML = "🔄 Cargando...";
        document.getElementById('syncStatus').className = "sync-status syncing";
        
        try {
            const resp = await fetch(SCRIPT_URL);
            const data = await resp.json();
            
            correcciones.clear();
            for (let [id, info] of Object.entries(data)) {
                if (info && info.persona && info.persona !== "") {
                    correcciones.set(parseInt(id), {
                        persona: info.persona.toLowerCase(),
                        fecha: info.fecha,
                        accion: info.accion
                    });
                }
            }
            
            document.getElementById('syncStatus').innerHTML = `🟢 Conectado (${correcciones.size} correcciones)`;
            document.getElementById('syncStatus').className = "sync-status synced";
            
            actualizarStats();
            dibujar();
            actualizarControlesLote();
            
        } catch(e) {
            console.error(e);
            document.getElementById('syncStatus').innerHTML = "⚠️ Error de conexión";
            document.getElementById('syncStatus').className = "sync-status synced";
        }
    }
    
    function actualizarStats() {
        let a = 0, m = 0;
        for (let info of correcciones.values()) {
            if (info.persona === "alejandro") a++;
            if (info.persona === "martha") m++;
        }
        const pend = TOTAL - a - m;
        const porc = ((a + m) / TOTAL) * 100;
        
        document.getElementById('total').textContent = TOTAL.toLocaleString();
        document.getElementById('alejandroCount').textContent = a.toLocaleString();
        document.getElementById('marthaCount').textContent = m.toLocaleString();
        document.getElementById('pendienteCount').textContent = pend.toLocaleString();
        document.getElementById('progressFill').style.width = porc + "%";
        document.getElementById('progressFill').innerHTML = porc.toFixed(1) + "%";
        document.getElementById('progressText').innerHTML = `📈 ${(a + m).toLocaleString()} de ${TOTAL.toLocaleString()} errores corregidos (${porc.toFixed(1)}%)`;
    }
    
    function actualizarControlesLote() {
        const inicio = (loteActual - 1) * REGISTROS_POR_LOTE + 1;
        const fin = Math.min(loteActual * REGISTROS_POR_LOTE, TOTAL);
        const primerId = todosIds[inicio - 1];
        const ultimoId = todosIds[fin - 1];
        document.getElementById('loteInfo').innerHTML = `Lote ${loteActual} de ${TOTAL_LOTES} (IDs ${primerId} - ${ultimoId})`;
    }
    
    function cambiarLote(delta) {
        const nuevo = loteActual + delta;
        if (nuevo >= 1 && nuevo <= TOTAL_LOTES) {
            loteActual = nuevo;
            dibujar();
            actualizarControlesLote();
        }
    }
    
    async function guardar(id, persona) {
        const nombrePersona = persona === "alejandro" ? "Alejandro" : "Martha";
        const url = `${SCRIPT_URL}?id=${id}&persona=${encodeURIComponent(nombrePersona)}&accion=MARCADO`;
        await fetch(url);
        await cargar();
    }
    
    async function eliminar(id) {
        const url = `${SCRIPT_URL}?id=${id}&persona=`;
        await fetch(url);
        await cargar();
    }
    
    function getColor(tipo) {
        if (tipo === "Año") return "cell-error-Año";
        if (tipo === "Idioma") return "cell-error-Idioma";
        if (tipo === "Mayúscula") return "cell-error-Mayúscula";
        return "";
    }
    
    function dibujar() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        
        for (let id of getIdsLote()) {
            const tipo = errores.get(id);
            const info = correcciones.get(id);
            const corregido = info ? info.persona : null;
            
            const celda = document.createElement('div');
            let clase = `cell ${getColor(tipo)}`;
            if (corregido === "alejandro") clase += " cell-corregido-alejandro";
            if (corregido === "martha") clase += " cell-corregido-martha";
            celda.className = clase;
            celda.textContent = id;
            celda.title = info ? `Corregido por ${info.persona} el ${info.fecha}` : `Pendiente - Error: ${tipo}`;
            
            celda.onclick = (function(pid) {
                return async function() {
                    if (correcciones.has(pid)) {
                        if (confirm(`¿Desmarcar registro ${pid}?`)) await eliminar(pid);
                    } else {
                        await guardar(pid, personaActual);
                    }
                };
            })(id);
            
            grid.appendChild(celda);
        }
    }
    
    document.getElementById('alejandroBtn').onclick = () => {
        personaActual = "alejandro";
        document.getElementById('alejandroBtn').classList.add('active');
        document.getElementById('marthaBtn').classList.remove('active');
    };
    document.getElementById('marthaBtn').onclick = () => {
        personaActual = "martha";
        document.getElementById('marthaBtn').classList.add('active');
        document.getElementById('alejandroBtn').classList.remove('active');
    };
    document.getElementById('syncBtn').onclick = () => cargar();
    document.getElementById('btnAnterior').onclick = () => cambiarLote(-1);
    document.getElementById('btnSiguiente').onclick = () => cambiarLote(1);
    
    cargar();
    setInterval(cargar, 5000);
</script>
</body>
</html>
