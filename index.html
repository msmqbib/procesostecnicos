<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Calor</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; margin: 0; }
        .container { max-width: 100%; background: white; border-radius: 12px; padding: 20px; }
        .stats { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: #f8f9fa; padding: 10px 20px; border-radius: 8px; text-align: center; }
        .stat-number { font-size: 1.5em; font-weight: bold; }
        .progress-bar { background: #ecf0f1; border-radius: 25px; height: 35px; margin: 15px 0; overflow: hidden; }
        .progress-fill { background: #27ae60; height: 100%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(50, 55px); gap: 3px; background: #f0f2f5; padding: 3px; overflow-x: auto; max-height: 55vh; overflow-y: auto; }
        .cell { width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; font-size: 9px; cursor: pointer; border-radius: 6px; font-weight: bold; color: white; position: relative; }
        .cell-error-Año { background-color: #119da4; }
        .cell-error-Idioma { background-color: #0c7489; }
        .cell-error-Mayúscula { background-color: #13505b; }
        .cell-corregido-alejandro { border: 3px solid #040404; }
        .cell-corregido-alejandro::after { content: "✓A"; position: absolute; bottom: 2px; right: 2px; font-size: 8px; background: rgba(4,4,4,0.9); padding: 2px 3px; border-radius: 3px; }
        .cell-corregido-martha { border: 3px solid #d7d9ce; }
        .cell-corregido-martha::after { content: "✓M"; position: absolute; bottom: 2px; right: 2px; font-size: 8px; background: rgba(215,217,206,0.9); padding: 2px 3px; border-radius: 3px; color: #2c3e50; }
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-alejandro { background: #34495e; color: white; }
        .btn-martha { background: #95a5a6; color: #2c3e50; }
        .active { transform: scale(1.05); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .sync-status { text-align: center; padding: 10px; margin: 10px; border-radius: 8px; }
        .synced { background: #d5f4e6; color: #27ae60; }
        .syncing { background: #ffeaa7; color: #f39c12; }
        .info-panel { margin-top: 15px; padding: 10px; background: #e8f4fd; border-radius: 8px; font-size: 12px; text-align: center; }
        @media (max-width: 900px) { .grid { grid-template-columns: repeat(30, 50px); } .cell { width: 50px; height: 50px; font-size: 8px; } }
    </style>
</head>
<body>
<div class="container">
    <h2>📊 Mapa de Calor</h2>
    
    <div id="syncStatus" class="sync-status syncing">🔄 Conectando...</div>
    
    <div class="stats">
        <div class="stat-card"><div class="stat-number" id="total">0</div><div>Total</div></div>
        <div class="stat-card"><div class="stat-number" id="alejandroCount">0</div><div>Alejandro</div></div>
        <div class="stat-card"><div class="stat-number" id="marthaCount">0</div><div>Martha</div></div>
        <div class="stat-card"><div class="stat-number" id="pendienteCount">0</div><div>Pendientes</div></div>
    </div>
    
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%">0%</div></div>
    
    <div style="text-align:center; margin: 15px 0;">
        <button id="alejandroBtn" class="btn-alejandro active">👤 Alejandro</button>
        <button id="marthaBtn" class="btn-martha">👤 Martha</button>
        <button id="syncBtn" style="background:#3498db; color:white;">🔄 Sincronizar</button>
    </div>
    
    <div id="grid" class="grid"></div>
    
    <div class="info-panel">
        📅 <span>Última corrección:</span> <span id="ultimaFecha">---</span>
    </div>
</div>

<script>
    // 🔴 🔴 🔴 CAMBIA ESTA URL POR LA TUYA 🔴 🔴 🔴
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_HswVXRcpuRpA-2sk-VYdpp7NFgX9J7tNrasdqMzR-7Foi9daMhXwxcww9MeJwh9y/exec";
    
    // ========================================
    // TUS ERRORES - AGREGAR AQUÍ
    // ========================================
    const errores = new Map();
    
    errores.set(220, "Año");
    errores.set(714, "Año");
    errores.set(786, "Año");
    errores.set(992, "Año");
    errores.set(1186, "Año");
    errores.set(13741, "Idioma");
    errores.set(20768, "Mayúscula");
    // ... sigue agregando
    
    // ========================================
    // NO CAMBIES DEBAJO
    // ========================================
    
    let correcciones = new Map();
    let personaActual = "alejandro";
    let ultimaFecha = "";
    
    const todosIds = Array.from(errores.keys()).sort((a,b) => a-b);
    const TOTAL = todosIds.length;
    
    async function cargar() {
        document.getElementById('syncStatus').innerHTML = "🔄 Cargando...";
        document.getElementById('syncStatus').className = "sync-status syncing";
        
        try {
            const resp = await fetch(SCRIPT_URL);
            const data = await resp.json();
            
            correcciones.clear();
            let fechaMasReciente = "";
            
            for (let [id, info] of Object.entries(data)) {
                if (info && info.persona && info.persona !== "") {
                    correcciones.set(parseInt(id), {
                        persona: info.persona.toLowerCase(),
                        fecha: info.fecha,
                        accion: info.accion
                    });
                    
                    if (info.fecha && info.fecha > fechaMasReciente) {
                        fechaMasReciente = info.fecha;
                    }
                }
            }
            
            if (fechaMasReciente) {
                ultimaFecha = fechaMasReciente;
                document.getElementById('ultimaFecha').textContent = ultimaFecha;
            }
            
            document.getElementById('syncStatus').innerHTML = `🟢 Conectado (${correcciones.size} correcciones)`;
            document.getElementById('syncStatus').className = "sync-status synced";
            
            actualizarStats();
            dibujar();
            
        } catch(e) {
            console.error(e);
            document.getElementById('syncStatus').innerHTML = "⚠️ Error de conexión";
            document.getElementById('syncStatus').className = "sync-status synced";
        }
    }
    
    async function guardar(id, persona) {
        const nombrePersona = persona === "alejandro" ? "Alejandro" : "Martha";
        const accion = "MARCADO";
        
        document.getElementById('syncStatus').innerHTML = "💾 Guardando...";
        
        const url = `${SCRIPT_URL}?id=${id}&persona=${encodeURIComponent(nombrePersona)}&accion=${accion}`;
        
        try {
            await fetch(url);
            console.log("✅ Guardado:", id, nombrePersona, new Date().toLocaleString());
            await cargar();
        } catch(e) {
            console.error("Error:", e);
            document.getElementById('syncStatus').innerHTML = "⚠️ Error al guardar";
        }
    }
    
    async function eliminar(id) {
        document.getElementById('syncStatus').innerHTML = "🗑️ Eliminando...";
        
        const url = `${SCRIPT_URL}?id=${id}&persona=`;
        
        try {
            await fetch(url);
            console.log("✅ Eliminado:", id);
            await cargar();
        } catch(e) {
            console.error("Error:", e);
            document.getElementById('syncStatus').innerHTML = "⚠️ Error al eliminar";
        }
    }
    
    function actualizarStats() {
        let a = 0, m = 0;
        for (let info of correcciones.values()) {
            if (info.persona === "alejandro") a++;
            if (info.persona === "martha") m++;
        }
        const pend = TOTAL - a - m;
        const porc = ((a + m) / TOTAL) * 100;
        
        document.getElementById('total').textContent = TOTAL;
        document.getElementById('alejandroCount').textContent = a;
        document.getElementById('marthaCount').textContent = m;
        document.getElementById('pendienteCount').textContent = pend;
        document.getElementById('progressFill').style.width = porc + "%";
        document.getElementById('progressFill').textContent = porc.toFixed(1) + "%";
    }
    
    function getColor(tipo) {
        if (tipo === "Año") return "cell-error-Año";
        if (tipo === "Idioma") return "cell-error-Idioma";
        if (tipo === "Mayúscula") return "cell-error-Mayúscula";
        return "";
    }
    
    function dibujar() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        
        for (let id of todosIds) {
            const tipo = errores.get(id);
            const info = correcciones.get(id);
            const corregido = info ? info.persona : null;
            
            const celda = document.createElement('div');
            let clase = `cell ${getColor(tipo)}`;
            if (corregido === "alejandro") clase += " cell-corregido-alejandro";
            if (corregido === "martha") clase += " cell-corregido-martha";
            celda.className = clase;
            celda.textContent = id;
            
            if (info && info.fecha) {
                celda.title = `Registro ${id} | ${info.persona === "alejandro" ? "Alejandro" : "Martha"} | ${info.fecha} | ${info.accion || "MARCADO"}`;
            } else {
                celda.title = `Registro ${id} - Error: ${tipo} - Pendiente`;
            }
            
            celda.onclick = (function(pid) {
                return async function() {
                    const ya = correcciones.has(pid);
                    if (ya) {
                        if (confirm(`¿Desmarcar registro ${pid}?`)) {
                            await eliminar(pid);
                        }
                    } else {
                        await guardar(pid, personaActual);
                    }
                };
            })(id);
            
            grid.appendChild(celda);
        }
    }
    
    document.getElementById('alejandroBtn').onclick = () => {
        personaActual = "alejandro";
        document.getElementById('alejandroBtn').classList.add('active');
        document.getElementById('marthaBtn').classList.remove('active');
    };
    
    document.getElementById('marthaBtn').onclick = () => {
        personaActual = "martha";
        document.getElementById('marthaBtn').classList.add('active');
        document.getElementById('alejandroBtn').classList.remove('active');
    };
    
    document.getElementById('syncBtn').onclick = () => cargar();
    
    cargar();
    setInterval(cargar, 5000);
</script>
</body>
</html>
